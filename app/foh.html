<!doctype html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <link rel="icon" href=https://viewcast.github.io/images/logo.png>
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>ViewCast | FOH</title>
        <style>
            * {
                margin: 0;
                padding: 0;
                box-sizing: border-box;
            }

            body {
                font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
                background: #000;
                color: white;
                overflow: hidden;
                width: 100vw;
                height: 100vh;
            }

            #displayContainer {
                position: relative;
                width: 100%;
                height: 100%;
                display: flex;
                align-items: center;
                justify-content: center;
            }

            /* Hard black overlay — sits above everything, used for B key */
            #blackOverlay {
                position: absolute;
                top: 0; left: 0;
                width: 100%; height: 100%;
                background: #000;
                z-index: 100;
                opacity: 0;
                pointer-events: none;
                transition: opacity 0.3s ease-in-out;
            }
            #blackOverlay.visible {
                opacity: 1;
                pointer-events: auto;
            }

            #backgroundLayer {
                position: absolute;
                top: 0; left: 0;
                width: 100%; height: 100%;
                z-index: 1;
                opacity: 0;
                transition: opacity 0.5s ease-in-out;
            }
            #backgroundLayer.visible { opacity: 1; }
            #backgroundLayer img,
            #backgroundLayer video {
                width: 100%; height: 100%;
                object-fit: cover;
            }

            #logoLayer {
                position: absolute;
                top: 50%; left: 50%;
                transform: translate(-50%, -50%);
                z-index: 2;
                opacity: 0;
                transition: opacity 0.5s ease-in-out;
                max-width: 80%; max-height: 80%;
            }
            #logoLayer.visible { opacity: 1; }
            #logoLayer img {
                max-width: 100%; max-height: 100%;
                object-fit: contain;
            }

            #contentLayer {
                position: relative;
                z-index: 3;
                width: 90%;
                max-width: 1400px;
                text-align: center;
                opacity: 0;
                transition: opacity 0.5s ease-in-out;
            }
            #contentLayer.visible { opacity: 1; }

            #contentLayer.media-mode {
                width: 100%; max-width: 100%; height: 100%;
                display: flex; align-items: center; justify-content: center;
            }

            .lyrics-text {
                font-size: 4rem;
                line-height: 1.5;
                font-weight: 700;
                text-shadow: 2px 2px 4px rgba(0, 0, 0, 0.8);
                white-space: pre-line;
                padding: 40px;
            }

            .sermon-image {
                max-width: 100%; max-height: 100vh;
                object-fit: contain;
            }

            .sermon-video {
                max-width: 100%; max-height: 100vh;
                object-fit: contain; background: #000;
            }

            .sermon-iframe {
                width: 100vw; height: 100vh;
                border: none; background: #fff;
            }

            #licenseDisplay {
                position: absolute;
                bottom: 20px; right: 30px;
                font-size: 1rem;
                color: rgba(255, 255, 255, 0.6);
                text-shadow: 2px 2px 4px rgba(0, 0, 0, 0.8);
                z-index: 10;
                opacity: 0;
                transition: opacity 0.3s;
            }
            #licenseDisplay.visible { opacity: 1; }

            #statusMsg {
                position: absolute;
                top: 20px; left: 50%;
                transform: translateX(-50%);
                font-size: 0.9rem;
                color: rgba(255, 255, 255, 0.3);
                z-index: 100;
                pointer-events: none;
            }
        </style>
    </head>
    <body>
        <div id="displayContainer">
            <div id="blackOverlay"></div>
            <div id="backgroundLayer"></div>
            <div id="logoLayer"></div>
            <div id="contentLayer"></div>
            <div id="licenseDisplay"></div>
            <div id="statusMsg">ViewCast | Waiting for content...</div>
        </div>

        <script>
            let currentBackground = null;
            let currentLogo = null;
            let backgroundVisible = false;
            let logoVisible = false;
            let blackActive = false;
            let globalFadeTime = 500;
            let globalSongFade = true;
            let licenseTimer = null;

            window.addEventListener("message", (event) => {
                const data = event.data;
                if (!data || !data.type) return;

                switch (data.type) {
                    case "init":
                        globalFadeTime = data.fadeTime !== undefined ? data.fadeTime : globalFadeTime;
                        globalSongFade = data.enableSongFade !== undefined ? data.enableSongFade : globalSongFade;
                        if (data.backgroundUrl) applyBackground(data.backgroundUrl);
                        if (data.logoUrl) setLogo(data.logoUrl);
                        document.getElementById("statusMsg").textContent = "FOH — Live";
                        break;

                    case "display":
                        if (data.fadeTime !== undefined) globalFadeTime = data.fadeTime;
                        if (data.enableSongFade !== undefined) globalSongFade = data.enableSongFade;
                        if (data.backgroundUrl) applyBackground(data.backgroundUrl);
                        if (data.logoUrl) setLogo(data.logoUrl);
                        displayContent(data.content, data.typography, data.fadeTime, data.enableSongFade);
                        break;

                    case "setBackground":
                        applyBackground(data.url);
                        break;

                    case "setLogo":
                        setLogo(data.url);
                        break;

                    case "fohCommand":
                        handleFohCommand(data.command);
                        break;
                }
            });

            function setLogo(url) {
                if (!url) return;
                currentLogo = url;
            }

            function applyBackground(url) {
                if (!url) return;
                currentBackground = url;
                const bgLayer = document.getElementById("backgroundLayer");
                const isVideo = /\.(mp4|webm|ogg)$/i.test(url);
                bgLayer.innerHTML = isVideo
                    ? `<video autoplay loop muted playsinline><source src="${url}"></video>`
                    : `<img src="${url}" alt="Background">`;
                bgLayer.classList.add("visible");
                backgroundVisible = true;
            }

            function handleFohCommand(command) {
                switch (command) {
                    case "toggleBackground":
                        // T key: clear all content, show only background
                        clearContent();
                        if (!backgroundVisible && currentBackground) {
                            applyBackground(currentBackground);
                        } else if (backgroundVisible) {
                            // background already showing — just ensure content is hidden
                            // (content was already cleared above)
                        }
                        break;

                    case "toggleLogo":
                        // L key: toggle logo overlay
                        const logoLayer = document.getElementById("logoLayer");
                        if (logoVisible) {
                            logoLayer.classList.remove("visible");
                            logoVisible = false;
                        } else if (currentLogo) {
                            logoLayer.innerHTML = `<img src="${currentLogo}" alt="Logo">`;
                            logoLayer.classList.add("visible");
                            logoVisible = true;
                        } else {
                            // Try the default ViewCast logo as fallback
                            logoLayer.innerHTML = `<img src="https://viewcast.github.io/images/logo.png" alt="Logo">`;
                            logoLayer.classList.add("visible");
                            logoVisible = true;
                            currentLogo = "https://viewcast.github.io/images/logo.png";
                        }
                        break;

                    case "blank":
                    case "black":
                        // B key: hard black — covers everything
                        toggleBlack(true);
                        break;
                }
            }

            function toggleBlack(forceOn) {
                const overlay = document.getElementById("blackOverlay");
                if (forceOn !== undefined) {
                    blackActive = forceOn;
                } else {
                    blackActive = !blackActive;
                }
                if (blackActive) {
                    overlay.classList.add("visible");
                } else {
                    overlay.classList.remove("visible");
                }
            }

            function clearContent() {
                // Hides content + logo, keeps background visible
                const contentLayer = document.getElementById("contentLayer");
                const logoLayer = document.getElementById("logoLayer");
                const licenseDisplay = document.getElementById("licenseDisplay");

                contentLayer.classList.remove("visible");
                logoLayer.classList.remove("visible");
                logoVisible = false;
                licenseDisplay.classList.remove("visible");

                setTimeout(() => {
                    contentLayer.innerHTML = "";
                    contentLayer.classList.remove("media-mode");
                }, globalFadeTime || 300);
            }

            function displayContent(content, typography, msgFadeTime, msgSongFade) {
                const contentLayer = document.getElementById("contentLayer");
                const licenseDisplay = document.getElementById("licenseDisplay");
                const statusMsg = document.getElementById("statusMsg");

                // Any real content cancels black overlay
                if (content && content.type !== "black") {
                    toggleBlack(false);
                }

                const ft = msgFadeTime !== undefined ? msgFadeTime : globalFadeTime;
                const useFade = msgSongFade !== undefined ? msgSongFade : globalSongFade;
                const effectiveFade = useFade ? ft : 0;

                statusMsg.style.opacity = "0";

                contentLayer.style.transition = effectiveFade > 0 ? `opacity ${effectiveFade}ms ease-in-out` : "none";
                contentLayer.classList.remove("visible");

                const applyContent = () => {
                    contentLayer.classList.remove("media-mode");

                    if (content.type === "blank") {
                        // Blank: hide content, keep background
                        contentLayer.innerHTML = "";
                        licenseDisplay.classList.remove("visible");
                        // Don't make visible — stays hidden
                        return;

                    } else if (content.type === "black") {
                        // Hard black overlay
                        contentLayer.innerHTML = "";
                        licenseDisplay.classList.remove("visible");
                        toggleBlack(true);
                        return;

                    } else if (content.type === "background") {
                        // T-key mode: clear content, show background only
                        contentLayer.innerHTML = "";
                        licenseDisplay.classList.remove("visible");
                        if (!backgroundVisible && currentBackground) {
                            applyBackground(currentBackground);
                        }
                        return;

                    } else if (content.type === "lyrics") {
                        const t = typography || {};
                        const style = [
                            `font-family: ${t.fontFamily || "'Segoe UI', sans-serif"}`,
                            `font-weight: ${t.fontWeight || 700}`,
                            `font-size: ${t.fontSize || 64}px`,
                            `color: ${t.textColor || "#ffffff"}`,
                            `text-shadow: ${t.textShadow || "2px 2px 4px rgba(0,0,0,0.8)"}`,
                            `text-align: ${t.textAlign || "center"}`,
                            `line-height: ${(t.lineHeight || 140) / 100}`
                        ].join(";");

                        contentLayer.innerHTML = `<div class="lyrics-text" style="${style}">${escapeHtml(content.text)}</div>`;

                        if (content.license) {
                            clearTimeout(licenseTimer);
                            licenseDisplay.textContent = content.license;
                            licenseDisplay.classList.add("visible");
                            licenseTimer = setTimeout(() => licenseDisplay.classList.remove("visible"), 5000);
                        }

                    } else if (content.type === "sermon") {
                        contentLayer.classList.add("media-mode");
                        const mediaType = content.mediaType || "image";

                        if (mediaType === "video") {
                            contentLayer.innerHTML = `<video class="sermon-video" autoplay controls loop>
                                <source src="${content.url}">
                            </video>`;
                        } else if (mediaType === "pdf") {
                            contentLayer.innerHTML = `<iframe class="sermon-iframe" src="${content.url}" title="PDF Slide"></iframe>`;
                        } else if (mediaType === "pptx") {
                            contentLayer.innerHTML = `<iframe class="sermon-iframe"
                                src="https://docs.google.com/viewer?url=${encodeURIComponent(content.url)}&embedded=true"
                                title="Presentation Slide"></iframe>`;
                        } else {
                            contentLayer.innerHTML = `<img src="${content.url}" class="sermon-image" alt="Slide">`;
                        }
                    }

                    contentLayer.style.transition = effectiveFade > 0 ? `opacity ${effectiveFade}ms ease-in-out` : "none";
                    contentLayer.classList.add("visible");
                };

                if (effectiveFade > 0) {
                    setTimeout(applyContent, effectiveFade);
                } else {
                    applyContent();
                }
            }

            function escapeHtml(str) {
                return String(str)
                    .replace(/&/g, "&amp;")
                    .replace(/</g, "&lt;")
                    .replace(/>/g, "&gt;")
                    .replace(/"/g, "&quot;");
            }

            if (window.opener) {
                window.opener.postMessage({ type: "fohReady" }, "*");
            }
        </script>
    </body>
</html>
